version: '3.8'

services:
  backend:
    build: .
    container_name: vnj_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: always

  frontend:
    build: ./vnj-chatbot-fe
    container_name: vnj_frontend
    ports:
      - "80:80"
    restart: always
    depends_on:
      - backend
